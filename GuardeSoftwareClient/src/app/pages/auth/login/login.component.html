<div class="min-h-screen relative flex items-center justify-end font-sans overflow-hidden bg-slate-900">
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0">
    <img
      src="assets/imgs/guardeloquequiera.png"
      alt="Guarde Lo Que Quiera - Depósitos y mudanzas"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-slate-950/50"></div>
  </div>

  <!-- Login Panel (Right-aligned Vertical Strip) -->
  <div class="relative z-10 w-full max-w-md min-h-screen bg-white/95 backdrop-blur-md shadow-2xl flex flex-col justify-center p-8 border-l border-slate-200/50">
    <!-- Title & Branding -->
    <div class="mb-8 text-center">
      <img src="assets/icons/favicon.svg" alt="GuardeSoftware Logo" class="mx-auto h-14 w-auto mb-4" />
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">
        Guarde Lo Que Quiera
      </h1>

    </div>

    <!-- Error Alert Box -->
    <div *ngIf="errorMessage" class="mb-4 p-3 rounded-lg bg-red-50 border border-red-100 text-red-700 text-sm flex items-center gap-2">
      <app-icon name="alert-triangle" class="w-4 h-4 text-red-500 flex-shrink-0"></app-icon>
      <span class="font-medium">{{ errorMessage }}</span>
    </div>

    <!-- Form -->
    <form id="loginForm" (ngSubmit)="submit()" class="space-y-5">
      <!-- Username Input -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Usuario</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <app-icon name="user" class="w-4 h-4"></app-icon>
          </span>
          <input
            type="text"
            id="username"
            [(ngModel)]="userName"
            name="username"
            autocomplete="username"
            [disabled]="loading"
            class="w-full pl-9 pr-4 py-2.5 rounded-lg bg-slate-50 text-slate-800 placeholder-slate-400 
                   border border-slate-200 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 
                   transition-all duration-150 disabled:opacity-50 text-sm"
            placeholder="Nombre de usuario"
            required
          />
        </div>
      </div>

      <!-- Password Input -->
      <div class="space-y-1.5">
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <app-icon name="lock" class="w-4 h-4"></app-icon>
          </span>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            [disabled]="loading"
            class="w-full pl-9 pr-10 py-2.5 rounded-lg bg-slate-50 text-slate-800 placeholder-slate-400 
                   border border-slate-200 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 
                   transition-all duration-150 disabled:opacity-50 text-sm"
            placeholder="••••••••"
            required
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors"
          >
            <app-icon name="eye" class="w-4 h-4" [ngClass]="{'opacity-50': !showPassword}"></app-icon>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium 
               shadow-sm hover:shadow active:scale-[0.99] transition-all duration-150 
               disabled:opacity-50 disabled:cursor-not-allowed text-sm mt-3"
      >
        <div class="flex items-center justify-center gap-2">
          <span *ngIf="loading" class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent text-white rounded-full"></span>
          <span>{{ loading ? 'Iniciando sesión...' : 'Ingresar' }}</span>
        </div>
      </button>
    </form>
  </div>
</div>
